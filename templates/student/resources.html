{% extends "base.html" %}
{% block content %}
<div class="container my-4">
    <h2 class="mb-4 text-center">📚 Available Resources</h2>
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        {% for r in resources %}
        <div class="col">
            <div class="card h-100 shadow-sm">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ r.title }}</h5>

                    <!-- File or Link -->
                    {% if r.file_url %}
                        <a href="{{ url_for('static', filename='uploads/' + r.file_url) }}" 
                           target="_blank" 
                           class="btn btn-primary mt-auto">Open File</a>
                    {% elif r.external_link %}
                        <a href="{{ r.external_link }}" 
                           target="_blank" 
                           class="btn btn-primary mt-auto">Open Link</a>
                    {% else %}
                        <span class="text-muted mt-auto">No resource available</span>
                    {% endif %}

                    <p class="card-text mt-2"><small class="text-muted">Uploaded by: {{ r.uploaded_by }}</small></p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
