{% extends "base.html" %}
{% block content %}
<div class="container my-4">

    <h2 class="mb-3">Student Forum</h2>

    <!-- ADD TOPIC FORM -->
    <form method="POST" class="card p-3 mb-4">
        <h5>Add New Topic</h5>
        
        <input type="text" name="title" class="form-control mb-2" placeholder="Title" required>

        <textarea name="description" class="form-control mb-2" rows="3" placeholder="Description" required></textarea>

        <button class="btn btn-primary">Add Topic</button>
    </form>

    <!-- TOPICS LIST -->
    {% for topic in topics %}
        <div class="card mb-3">
            <div class="card-body">
                <h4>{{ topic.title }}</h4>
                <p class="text-muted">
                    {{ topic.posted_by }} | {{ topic.created_at.strftime('%d %b %Y, %H:%M') }}
                </p>

                <a href="{{ url_for('student_forum_topic', topic_id=topic.id) }}" class="btn btn-success btn-sm">View</a>
<form method="POST" action="{{ url_for('delete_student_topic', topic_id=topic.id) }}" style="display:inline;">
    <button class="btn btn-danger btn-sm" onclick="return confirm('Delete this topic?');">Delete</button>
</form>

            </div>
        </div>
    {% endfor %}

</div>
{% endblock %}
