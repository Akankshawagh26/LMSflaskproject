{% extends "base.html" %}
{% block content %}
<div class="container my-4">
    <h2>{{ topic.title }}</h2>
    <p class="text-muted">Posted by: {{ topic.posted_by }} | {{ topic.created_at.strftime('%d %b %Y, %H:%M') }}</p>
    <p>{{ topic.description }}</p>

    <!-- Buttons -->
    <div class="mt-3 d-flex gap-2">
        <!-- Back to student forum list -->
        <a href="{{ url_for('student_forum') }}" class="btn btn-secondary">Back to Forum</a>
        <!-- <a href="{{ url_for('student_forum_topic', topic_id=topic.id) }}" class="btn btn-success btn-sm">Edit</a> -->
    </div>
</div>
{% endblock %}
