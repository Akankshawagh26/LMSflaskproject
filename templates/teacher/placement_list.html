{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Placements</h2>

    <!-- Add Placement Button --><!-- Add Placement Button -->
<a href="{{ url_for('teacher_add_placement') }}" class="btn btn-success mb-3">Add Placement</a>


    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Company</th>
                <th>Role</th>
                <th>Package</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for placement in placements %}
            <tr>
                <td>{{ placement.company }}</td>
                <td>{{ placement.role }}</td>
                <td>{{ placement.package }}</td>

                <td>


<!-- Edit button -->
<a href="{{ url_for('teacher_edit_placement', placement_id=placement.id) }}" class="btn btn-sm btn-primary">Edit</a>

                    <!-- Delete Placement -->
                    <form action="{{ url_for('teacher_delete_placement', placement_id=placement.id) }}" method="POST" style="display:inline;">
    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this placement?')">
        Delete
    </button>
</form>

                </td>

            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
