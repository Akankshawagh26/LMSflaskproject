<!DOCTYPE html>
<html>
<head>
    <title>Teacher – Upload Videos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            max-width: 800px;
            margin: auto;
            margin-top: 40px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .upload-box {
            background: #fff;
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #007bff;
            color: #fff;
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        .video-card {
            background: #fff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .video-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #444;
        }

        video {
            width: 100%;
            border-radius: 10px;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>📤 Upload Lecture Video</h2>

    <div class="upload-box">
        <form method="POST" enctype="multipart/form-data">
            <input type="text" name="title" placeholder="Video Title" required>
            <input type="file" name="video" accept="video/*" required>
            <button type="submit">Upload Video</button>
        </form>
    </div>

    <h2>🎬 Uploaded Videos</h2>

  {% for video in videos %}
  <div>
    <h5>{{ video.title }}</h5>
    <video width="320" height="240" controls>
      <source src="{{ url_for('serve_video', filename=video.filename) }}" type="video/mp4">

      Your browser does not support the video tag.
    </video>
  </div>
{% endfor %}

</div>

</body>
</html>
