{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <h2>All Students</h2>

  <table class="table table-bordered">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Email</th>
    </tr>

    {% for s in students %}
    <tr>
      <td>{{ s.id }}</td>
      <td>{{ s.name }}</td>
      <td>{{ s.email }}</td>
    </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
