{% extends "base.html" %}
{% block content %}
<div class="container my-4">

    <h2>{{ topic.title }}</h2>
    <p class="text-muted">{{ topic.posted_by }} | {{ topic.created_at.strftime('%d %b %Y, %H:%M') }}</p>
    <p>{{ topic.description }}</p>

    <a href="{{ url_for('teacher_forum') }}" class="btn btn-secondary">Back</a>

</div>
{% endblock %}
